server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # DNS interno de Docker. Sin esto nginx resuelve el upstream UNA vez, al
    # arrancar: si el backend todavía no existe no levanta, y si el contenedor
    # se recrea con otra IP se queda hablándole a la vieja. Con resolver +
    # variable en proxy_pass, la resolución es por petición.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # El nombre lleva el prefijo del proyecto a propósito. En Dokploy todos los
    # stacks comparten `dokploy-network` y el DNS de Docker resuelve por nombre
    # en todas las redes: un servicio llamado "backend" podría resolver al
    # backend de OTRA app del servidor.
    set $xtrem_api http://xtrem-backend:8000;

    location /api/ {
        # Con variable, nginx reenvía el URI original completo (/api/v1/...).
        proxy_pass $xtrem_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Los PDF y el Excel de reportes tardan más que una consulta normal.
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass $xtrem_api;
        proxy_set_header Host $host;
    }

    # Los assets llevan hash en el nombre: se pueden cachear para siempre.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # El index NO se cachea: si no, tras un deploy el navegador sigue pidiendo
    # los chunks viejos y la app queda rota hasta un refresco forzado.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # SPA: cualquier ruta desconocida la resuelve React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
